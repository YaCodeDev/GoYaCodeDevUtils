name: Go CI

on:
  push:
    branches:
      - main
      - master
      - dev
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint Code
    runs-on:
      - self-hosted
      - ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m
      - name: Ensure make is available
        run: command -v make || (sudo apt-get update && sudo apt-get install -y make)
      - name: Run Tests
        run: make test GO_TEST_FLAGS=-v
